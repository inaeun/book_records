<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<body>

<div class="container">

    <form action="/records/new" method="post">

        <div class="form-group">

            <label for="id">책 제목</label>

            <select id="id" name="id">
                <option value="">책을 선택하세요</option>
            </select>

            <label for="date">날짜</label>
            <input type="date" id="date" name="date"
                   placeholder="읽은 날짜를 입력하세요">

            <label for="pages">쪽수</label>
            <input type="number" id="pages" name="pages"
                   placeholder="읽은 쪽수를 입력하세요">

            <label for="inspirations">느낀점</label>
            <input type="text" id="inspirations" name="inspirations"
                   placeholder="느낀점을 입력하세요">

        </div>

        <button type="submit">등록</button>

    </form>

</div>

<script>

    fetch("http://localhost:8080/bookinfos2")
        .then(response => response.json())
        .then(data => {

            const select = document.getElementById("id");

            data.forEach(book => {

                const option = document.createElement("option");

                option.value = book.id;
                option.textContent = book.bookname;

                select.appendChild(option);

            });

        })
        .catch(error => {
            console.error("에러 발생:", error);
        });

</script>

</body>
</html>
